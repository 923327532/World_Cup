<section class="history-page">
  <header class="history-head">
    <div>
      <p class="section-index">02 / HISTORIAL DE APUESTAS</p>
      <h1>TUS JUGADAS<br /><em>GUARDADAS.</em></h1>
    </div>
    <a class="new-link" mat-flat-button routerLink="/predictions">
      <mat-icon>add</mat-icon>
      Nueva apuesta
    </a>
  </header>

  <article class="history-card" *ngFor="let prediction of predictions$ | async">
    <div class="history-card__match">
      <strong>{{ $any(prediction).matchLabel || 'Partido #' + prediction.matchId }}</strong>
      <span>{{ prediction.createdAt | appDate }}</span>
    </div>
    <b>{{ prediction.predictionValue }}</b>
    <app-badge
      [label]="prediction.isLocked ? 'Bloqueada' : 'Editable'"
      [tone]="prediction.isLocked ? 'neutral' : 'success'"
    ></app-badge>
    <em>{{ prediction.points || 0 | points }}</em>
  </article>
</section>
