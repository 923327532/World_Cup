<section class="page">
  <header>
    <h1>Notificaciones</h1>
    <p>Revisa alertas de resultados y actividad.</p>
  </header>

  <div class="list" *ngIf="notifications$ | async as notifications">
    <mat-card *ngFor="let item of notifications" [class.unread]="!item.isRead">
      <mat-card-header>
        <mat-card-title>{{ item.title }}</mat-card-title>
        <mat-card-subtitle>{{ item.createdAt | appDate }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>{{ item.message }}</mat-card-content>
      <mat-card-actions>
        <button mat-stroked-button type="button" (click)="markAsRead(item)" [disabled]="item.isRead">
          {{ item.isRead ? 'Leido' : 'Marcar como leido' }}
        </button>
      </mat-card-actions>
    </mat-card>

    <mat-card *ngIf="notifications.length === 0">
      <mat-card-content>No tienes notificaciones por ahora.</mat-card-content>
    </mat-card>
  </div>
</section>
