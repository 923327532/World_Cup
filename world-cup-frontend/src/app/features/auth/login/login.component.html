<section class="auth-shell">
  <p class="auth-kicker"><span></span>Acceso oficial</p>
  <h1>INICIA TU<br /><em>JUGADA.</em></h1>
  <p class="auth-copy">
    Entra al Betting Center y administra tus pronosticos para cada partido del Mundial.
  </p>

  <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
      <button
        mat-icon-button
        matSuffix
        type="button"
        [attr.aria-label]="hidePassword ? 'Mostrar contraseña' : 'Ocultar contraseña'"
        (click)="hidePassword = !hidePassword"
      >
        <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
      </button>
    </mat-form-field>

    <button class="auth-submit" mat-flat-button type="submit" [disabled]="form.invalid || isLoading">
      <mat-icon>{{ isLoading ? 'hourglass_top' : 'login' }}</mat-icon>
      {{ isLoading ? 'Verificando...' : 'Entrar al panel' }}
    </button>

    <div class="auth-error" *ngIf="errorMessage" aria-live="polite">
      {{ errorMessage }}
    </div>
  </form>

  <a class="auth-link" routerLink="/auth/register">Crear cuenta</a>
</section>
