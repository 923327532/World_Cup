<section class="auth-shell">
  <p class="auth-kicker"><span></span>Nuevo usuario</p>
  <h1>CREA TU<br /><em>CUENTA.</em></h1>
  <p class="auth-copy">Activa tu perfil y empieza a guardar tus apuestas del torneo.</p>

  <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline">
      <mat-label>Nombres</mat-label>
      <input matInput formControlName="firstName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Apellidos</mat-label>
      <input matInput formControlName="lastName" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" formControlName="email" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
      <button
        mat-icon-button
        matSuffix
        type="button"
        [attr.aria-label]="hidePassword ? 'Mostrar contraseña' : 'Ocultar contraseña'"
        (click)="hidePassword = !hidePassword"
      >
        <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
      </button>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Rol</mat-label>
      <mat-select formControlName="role">
        <mat-option value="STUDENT">Student</mat-option>
        <mat-option value="TEACHER">Teacher</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Codigo estudiantil</mat-label>
      <input matInput formControlName="studentCode" />
    </mat-form-field>
    <button class="auth-submit" mat-flat-button type="submit" [disabled]="form.invalid || isLoading">
      <mat-icon>{{ isLoading ? 'hourglass_top' : 'person_add' }}</mat-icon>
      {{ isLoading ? 'Creando cuenta...' : 'Registrarme' }}
    </button>

    <div class="auth-error" *ngIf="errorMessage" aria-live="polite">
      {{ errorMessage }}
    </div>
  </form>

  <a class="auth-link" routerLink="/auth/login">Ya tengo cuenta</a>
</section>
