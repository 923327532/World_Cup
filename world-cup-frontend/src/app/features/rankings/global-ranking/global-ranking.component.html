<section class="page">
  <header>
    <h1>Ranking global</h1>
    <nav>
      <a mat-stroked-button routerLink="/rankings/campus"><mat-icon>school</mat-icon>Campus</a>
      <a mat-stroked-button routerLink="/rankings/career"><mat-icon>badge</mat-icon>Carrera</a>
      <a mat-stroked-button routerLink="/rankings/department"><mat-icon>business</mat-icon>Departamento</a>
    </nav>
  </header>
  <table mat-table [dataSource]="(ranking$ | async) || []">
    <ng-container matColumnDef="position"><th mat-header-cell *matHeaderCellDef>#</th><td mat-cell *matCellDef="let item">{{ item.rankingPosition }}</td></ng-container>
    <ng-container matColumnDef="userId"><th mat-header-cell *matHeaderCellDef>Usuario</th><td mat-cell *matCellDef="let item">#{{ item.userId }}</td></ng-container>
    <ng-container matColumnDef="points"><th mat-header-cell *matHeaderCellDef>Puntos</th><td mat-cell *matCellDef="let item"><strong>{{ item.points | points }}</strong></td></ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</section>
