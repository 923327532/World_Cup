<section class="page">
  <header>
    <h1>Ranking por carrera</h1>
    <mat-form-field appearance="outline">
      <mat-label>Carrera</mat-label>
      <mat-select [formControl]="career">
        <mat-option *ngFor="let item of (careers$ | async) || []" [value]="item.id">{{ item.name }}</mat-option>
      </mat-select>
    </mat-form-field>
  </header>
  <mat-card *ngFor="let item of ranking$ | async">
    <span>#{{ item.rankingPosition }}</span>
    <strong>Usuario {{ item.userId }}</strong>
    <em>{{ item.points | points }}</em>
  </mat-card>
</section>
