<mat-card>
  <mat-card-header>
    <mat-card-title>Chat del partido</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="send()">
      <mat-form-field appearance="outline">
        <mat-label>Comentario</mat-label>
        <input matInput formControlName="content" maxlength="180" />
      </mat-form-field>
      <button mat-icon-button color="primary" type="submit" [disabled]="form.invalid" aria-label="Enviar comentario">
        <mat-icon>send</mat-icon>
      </button>
    </form>

    <div class="comment" *ngFor="let comment of comments$ | async">
      <div>
        <strong>{{ comment.user }}</strong>
        <span>{{ comment.createdAt | appDate }}</span>
      </div>
      <p>{{ comment.content }}</p>
      <app-reactions [reactions]="comment.reactions" (reaction)="react(comment.id, $event)"></app-reactions>
    </div>
  </mat-card-content>
</mat-card>
