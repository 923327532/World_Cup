<section class="page">
  <h1>Logros</h1>
  <mat-card>
    <mat-icon>military_tech</mat-icon>
    <strong>{{ (score$ | async)?.totalPoints || 0 }}</strong>
    <span>Puntos totales</span>
  </mat-card>
  <mat-card *ngFor="let item of (history$ | async) || []">
    <mat-icon>task_alt</mat-icon>
    <strong>{{ item.points }}</strong>
    <span>{{ item.reason }}</span>
  </mat-card>
</section>
