<section class="page" *ngIf="match$ | async as match">
  <header>
    <a mat-icon-button routerLink="/matches" aria-label="Volver a partidos">
      <mat-icon>arrow_back</mat-icon>
    </a>
    <div>
      <h1>{{ match.homeTeam }} vs {{ match.awayTeam }}</h1>
      <p>{{ match.kickoffTime | appDate }}</p>
    </div>
  </header>

  <div class="grid">
    <div class="main">
      <app-match-card [match]="match"></app-match-card>
    </div>
    <app-live-chat [matchId]="match.id"></app-live-chat>
  </div>
</section>
