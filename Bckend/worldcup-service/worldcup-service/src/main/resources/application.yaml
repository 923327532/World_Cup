server:
  port: 8084

spring:
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://config-service:8888}
  application:
    name: worldcup-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/worldcup_db
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  redis:
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin123}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

api:
  worldcup:
    base-url: ${WORLD_CUP_API_URL:https://worldcup26.ir}
  football:
    api-key: ${API_SPORTS_KEY:8b08c7d941c2593665d49fd849b18f82}
    base-url: ${API_SPORTS_URL:https://v3.football.api-sports.io}
    league-id: 71
    season: 2024

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
