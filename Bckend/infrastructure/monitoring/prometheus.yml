global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']

  - job_name: 'organization-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['organization-service:8083']

  - job_name: 'worldcup-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['worldcup-service:8084']

  - job_name: 'prediction-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['prediction-service:8085']

  - job_name: 'scoring-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['scoring-service:8086']

  - job_name: 'leaderboard-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['leaderboard-service:8087']

  - job_name: 'social-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['social-service:8088']

  - job_name: 'gamification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gamification-service:8089']

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8090']