services:
  # ============================================
  # INFRAESTRUCTURA BASE
  # ============================================

  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: world-cup-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MAX_CONNECTIONS: 200
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infrastructure/postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - world-cup-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Redis
  redis:
    image: redis:7-alpine
    container_name: world-cup-redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-data:/data
    networks:
      - world-cup-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: world-cup-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - world-cup-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # FLYWAY (Migraciones centralizadas)
  # ============================================
  flyway:
    image: flyway/flyway:10-alpine
    container_name: world-cup-flyway
    command: -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB} -user=${POSTGRES_USER} -password=${POSTGRES_PASSWORD} -connectRetries=60 migrate
    volumes:
      - ./infrastructure/postgres/migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - world-cup-network

  # ============================================
  # SERVICIOS DE INFRAESTRUCTURA (Spring Cloud)
  # ============================================

  # Discovery Service (Eureka)
  discovery-service:
    build:
      context: ./Discovery Service/Discovery-Service
      dockerfile: Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      SPRING_APPLICATION_NAME: discovery-service
    networks:
      - world-cup-network

  # Config Service
  config-service:
    build:
      context: ./Config Service/Config-Service
      dockerfile: Dockerfile
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      SPRING_APPLICATION_NAME: config-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
    networks:
      - world-cup-network
    depends_on:
      - discovery-service

  # API Gateway
  api-gateway:
    build:
      context: ./Gateway/Gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT}:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      CONFIG_SERVER_URL: http://config-service:8888
    networks:
      - world-cup-network
    depends_on:
      - discovery-service
      - config-service

  # ============================================
  # MICROSERVICIOS DE NEGOCIO
  # ============================================

  # Auth Service (puerto 8081)
  auth-service:
    build:
      context: ./auth-service/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:8081"
    environment:
      SPRING_APPLICATION_NAME: auth-service
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      CONFIG_SERVER_URL: http://config-service:8888
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    networks:
      - world-cup-network
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_started

  # Organization Service (puerto 8083)
  organization-service:
    build:
      context: ./organization-service/organization-service
      dockerfile: Dockerfile
    container_name: organization-service
    ports:
      - "${ORGANIZATION_SERVICE_PORT}:8083"
    environment:
