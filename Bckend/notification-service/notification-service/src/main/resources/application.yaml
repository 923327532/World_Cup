server:
  port: 8090

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/worldcup_db
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:admin123}

  mail:
    host: ${BREVO_SMTP_SERVER:smtp-relay.brevo.com}
    port: ${BREVO_SMTP_PORT:587}
    username: ${BREVO_SENDER_EMAIL:notificaciones@worldcup.com}
    password: ${BREVO_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          timeout: 5000
          connectiontimeout: 5000
          writetimeout: 5000

brevo:
  api:
    key: ${BREVO_API_KEY}
    url: https://api.brevo.com/v3/smtp/email
  sender:
    email: ${BREVO_SENDER_EMAIL:notificaciones@worldcup.com}
    name: ${BREVO_SENDER_NAME:World Cup 2026}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always